name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual triggers

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: production # Use GitHub environments for protection

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      # 1. Prepare files for transfer
      # We do NOT build here to avoid 'glibc' or binary mismatches.
      # We only sync source code, package files, and public assets.
      - name: Copy files to VPS via Rsync
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          # Source files to upload
          source: "src,package.json,pnpm-lock.yaml,payload.config.ts,tsconfig.json,public"
          # Remote path on the VPS
          target: "/var/www/michinomicon-dev"
          # Clean up naming if syncing directly to folder
          strip_components: 0 

      # 2. Execute Build and Restart on Remote Server
      - name: Remote Build & Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Navigate to app directory
            cd /var/www/michinomicon-dev
            
            # Load Node/NVM environment if necessary (common VPS issue)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # Install dependencies
            echo "Installing dependencies..."
            pnpm install --frozen-lockfile

            # Build Payload
            # This ensures 'sharp' and other binaries are built for the correct OS
            echo "Building Payload..."
            pnpm build

            # Run Migrations (Optional - usually recommended)
            # echo "Running Migrations..."
            # pnpm payload migrate

            # Restart Application using PM2
            echo "Restarting PM2..."
            pm2 reload ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production
      
      # ===============================================================
      ## Depreciated
