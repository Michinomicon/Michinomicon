name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual triggers

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: production # Use GitHub environments for protection

    steps:          
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Test Network Connectivity
        run: |
          # Try to reach the server on defined port with a 5-second timeout
          nc -zv -w 5 ${{ secrets.SSH_HOST }} ${{ secrets.SSH_PORT }}

      # 1. Setup SSH Key for Rsync
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >>~/.ssh/config <<END
          Host vps
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            Port ${{ secrets.SSH_PORT }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          END

      # 2. Use native Rsync (More reliable than scp-action)
      - name: Deploy with Rsync
        run: |
          rsync -avz --delete \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude '.env' \
            ./ vps:/var/www/my-payload-app/
          
      # # 1. Prepare files for transfer
      # # We do NOT build here to avoid 'glibc' or binary mismatches.
      # # We only sync source code, package files, and public assets.
      # - name: Copy files to VPS via Rsync
      #   uses: appleboy/scp-action@v0.1.7
      #   with:
      #     host: ${{ secrets.SSH_HOST }}
      #     username: ${{ secrets.SSH_USER }}
      #     key: ${{ secrets.SSH_PRIVATE_KEY }}
      #     port: ${{ secrets.SSH_PORT }}
      #     # Source files to upload
      #     source: "src,package.json,pnpm-lock.yaml,payload.config.ts,tsconfig.json,public"
      #     # Remote path on the VPS
      #     target: "/var/www/michinomicon-dev"
      #     # Clean up naming if syncing directly to folder
      #     strip_components: 0 

      # 2. Execute Build and Restart on Remote Server
      - name: Remote Build & Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # 1. Load NVM (Node Version Manager)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            
            # 2. Add PNPM to PATH (Crucial Fix)
            # Standalone pnpm is usually installed here, but non-interactive shells miss it
            export PNPM_HOME="$HOME/.local/share/pnpm"
            export PATH="$PNPM_HOME:$PATH"
            
            # 3. Navigate to folder
            cd /var/www/michinomicon-dev

            # 4. Verify tools exist (Optional debugging)
            echo "Using Node: $(node -v)"
            echo "Using PNPM: $(pnpm -v)"
            
            # 5. Install & Build
            echo "Installing..."
            pnpm install --frozen-lockfile
            echo "Building..."
            pnpm build

            # Run Migrations (Optional - usually recommended)
            # echo "Running Migrations..."
            # pnpm payload migrate

            # Restart Application using PM2
            echo "Restarting PM2..."
            pm2 reload ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production

            # Save the PM2 list so it resurrects on server reboot
            pm2 save
      
