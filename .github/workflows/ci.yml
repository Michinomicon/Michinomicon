name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # strategy allows you to test against multiple node versions if necessary
    strategy:
      matrix:
        node-version: [22.x]

    # configuration to run a database if your tests require a live connection
    # remove comments below if using MongoDB for integration tests
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build Application
        run: pnpm build
        # run: pnpm next build --experimental-build-mode compile
        # Payload requires these env vars to validate config during build
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET || 'dummy-secret-for-ci-build' }}
          # Use a dummy URI for build only, or the service URI if testing
          DATABASE_URI: ${{ secrets.DATABASE_URI || 'mongodb://127.0.0.1/payload-ci' }}

      - name: Run Tests
        run: pnpm exec playwright install && pnpm test
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET || 'dummy-secret-for-ci-build' }}
          DATABASE_URI: ${{ secrets.DATABASE_URI || 'mongodb://127.0.0.1/payload-ci' }}
