name: CI

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    # tests require a live connection to DB
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:    
      - name: Checkout source code
        uses: actions/checkout@v6
      
      - name: Install canvas dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        # run: pnpm install --frozen-lockfile
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Build Application
        run: pnpm build
        # Payload requires these env vars to validate config during build
        env:
          APP_NAME: ${{vars.APP_NAME || 'APP_NAME'}}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET || 'dummy-secret-for-ci-build' }}
          # Use a dummy URI for build only, or the service URI if testing
          DATABASE_URI: 'mongodb://127.0.0.1:27017/payload-ci'

      - name: Run Tests
        run: pnpm exec playwright install && pnpm test
        env:
          APP_NAME: ${{vars.APP_NAME || 'APP_NAME'}}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET || 'dummy-secret-for-ci-build' }}
          DATABASE_URI: 'mongodb://127.0.0.1:27017/payload-ci'
